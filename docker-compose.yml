version: '3.8'

services:
  # 1. MinIO Object Storage
  aegis-minio:
    image: minio/minio:latest
    container_name: aegis-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "aegis_admin"
      MINIO_ROOT_PASSWORD: "aegis_password"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - aegis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. MinIO Setup
  aegis-minio-setup:
    image: minio/mc
    container_name: aegis-minio-setup
    depends_on:
      aegis-minio:
        condition: service_healthy
    networks:
      - aegis-net
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add myminio http://aegis-minio:9000 aegis_admin aegis_password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/aegis-raw-docs;
      /usr/bin/mc policy set public myminio/aegis-raw-docs;
      exit 0;
      "

  # 3. Apache Kafka
  aegis-kafka:
    image: apache/kafka:3.7.0
    container_name: aegis-kafka
    ports:
      - "9092:9092"
    networks:
      - aegis-net
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://aegis-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@aegis-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 4. Qdrant Vector Database
  aegis-qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - aegis-net
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    # Removed healthcheck because Qdrant's container image has no curl/wget installed

  # 5. Spring Boot Ingestion Gateway (Phase 1)
  aegis-gateway:
    build:
      context: ./aegis-ingestion-gateway
      dockerfile: Dockerfile
    container_name: aegis-gateway
    ports:
      - "8080:8080"
    networks:
      - aegis-net
    volumes:
      # Mount the local source code into the container for rapid iteration
      - ./aegis-ingestion-gateway/src:/app/src
    depends_on:
      aegis-kafka:
        condition: service_healthy
      aegis-minio:
        condition: service_healthy
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=aegis-kafka:9092
      - MINIO_URL=http://aegis-minio:9000
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/api/v1/documents"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 6. Python AI Brain & MCP Server (Phase 2)
  aegis-ai:
    build:
      context: ./aegis-ai-core
      dockerfile: Dockerfile
    container_name: aegis-ai
    ports:
      - "8000:8000"
    networks:
      - aegis-net
    volumes:
      # Mount the local Python code so Uvicorn --reload works instantly without rebuilding
      - ./aegis-ai-core:/app
    depends_on:
      aegis-kafka:
        condition: service_healthy
      aegis-minio:
        condition: service_healthy
      aegis-qdrant:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=aegis-kafka:9092
      - MINIO_URL=aegis-minio:9000
      - QDRANT_URL=http://aegis-qdrant:6333
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  minio_data:
  kafka_data:
  qdrant_data:

networks:
  aegis-net:
    driver: bridge