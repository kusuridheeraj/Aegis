version: '3.8'

services:
  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: aegis-minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Port
    environment:
      MINIO_ROOT_USER: "aegis_admin"
      MINIO_ROOT_PASSWORD: "aegis_password"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # MinIO setup container to automatically create the bucket
  minio-create-bucket:
    image: minio/mc
    container_name: aegis-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add myminio http://minio:9000 aegis_admin aegis_password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/aegis-raw-docs;
      /usr/bin/mc policy set public myminio/aegis-raw-docs;
      exit 0;
      "

  # Apache Kafka (KRaft Mode)
  kafka:
    image: apache/kafka:3.7.0
    container_name: aegis-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

volumes:
  minio_data:
  kafka_data: